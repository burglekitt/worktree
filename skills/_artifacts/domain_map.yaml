library:
  name: '@burglekitt/worktree'
  version: '1.2.0'
  repository: 'https://github.com/burglekitt/worktree'
  description: 'Workflow-oriented CLI that wraps git worktree commands into repeatable daily-use tasks.'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'setting up and configuring'
    slug: 'setup'
    description: 'First-time install, git config defaults, and third-party auth setup (GitHub, Jira).'

  - name: 'daily worktree workflow'
    slug: 'workflow'
    description: 'Creating, opening, and navigating worktrees during normal development.'

  - name: 'housekeeping'
    slug: 'maintenance'
    description: 'Listing, removing, and cleaning up stale worktrees.'

skills:
  - name: 'core'
    slug: 'core'
    domain: 'workflow'
    description: >
      Complete guide to @burglekitt/worktree: install, configure, create worktrees from new
      or existing branches, open and list them, and clean up stale ones. Covers GitHub and
      Jira issue-to-branch integration and env file copying.
    type: 'core'
    covers:
      - 'worktree config (all 9 keys)'
      - 'worktree branch (new branch + --source + --github + --jira)'
      - 'worktree checkout (existing remote branch)'
      - 'worktree list'
      - 'worktree open'
      - 'worktree remove / rm'
      - 'worktree cleanup'
      - 'GitHub issue integration (--github flag, auth fallback chain)'
      - 'Jira issue integration (--jira flag, 3-key auth)'
      - 'automatic .env / .env.local copying into new worktrees'
      - 'branch name validation rules'
      - 'git config burglekitt.worktree.* storage model'
    tasks:
      - 'install @burglekitt/worktree and run first-time config'
      - 'create a new branch in its own worktree'
      - 'check out a colleague''s existing remote branch as a worktree'
      - 'derive a branch name from a GitHub issue number'
      - 'derive a branch name from a Jira ticket ID'
      - 'reopen an existing worktree in an editor'
      - 'list all active worktrees'
      - 'remove a specific worktree'
      - 'clean up all stale worktrees'
    failure_modes:
      - mistake: 'Using worktree checkout to create a new branch'
        mechanism: >
          checkout only works on existing remote branches; branch is the correct
          command for creating something new. Agents confuse these from command names alone.
        wrong_pattern: |
          worktree checkout feature/my-brand-new-feature
        correct_pattern: |
          worktree branch feature/my-brand-new-feature
        source: 'docs/commands/branch, docs/commands/checkout'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Running any command outside a git repository'
        mechanism: >
          gitGetRootPath() throws "Unable find the root path. Are you in a git repository?"
          All commands require a valid git repo in the working directory or any parent.
        wrong_pattern: |
          # In /tmp or a non-git directory
          worktree branch feature/x
        correct_pattern: |
          cd /path/to/your/git/repo
          worktree branch feature/x
        source: 'src/lib/git.ts — gitGetRootPath() error throw'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Skipping worktree config before first branch or checkout'
        mechanism: >
          defaultSourceBranch is not set; branch will prompt interactively for a source
          branch, which blocks non-interactive agent runs. codeEditor not set means the
          worktree is created but not opened.
        wrong_pattern: |
          # Fresh global install — immediately try to branch
          worktree branch feature/x
        correct_pattern: |
          # Run config first (once per repo)
          worktree config
          worktree branch feature/x
        source: 'README quick start, docs/getting-started'
        priority: 'HIGH'
        status: 'active'

      - mistake: '--source flag given without origin/ prefix causes interactive prompt'
        mechanism: >
          A source value without "origin/" triggers a confirm() prompt asking whether
          to use a local branch. A non-interactive agent run will hang waiting for input.
        wrong_pattern: |
          worktree branch feature/x --source main
        correct_pattern: |
          worktree branch feature/x --source origin/main
        source: 'src/commands/branch.ts — confirmNonOriginSource()'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Using --jira with only partial Jira config set'
        mechanism: >
          All three keys (jira.host, jira.email, jira.apiToken) are required.
          Supplying one or two causes an authentication error at the Jira API call.
        wrong_pattern: |
          worktree config jira.host https://company.atlassian.net
          worktree branch --jira DEV-123   # fails — email and token missing
        correct_pattern: |
          worktree config jira.host https://company.atlassian.net
          worktree config jira.email your@company.com
          worktree config jira.apiToken <token>
          worktree branch --jira DEV-123
        source: 'docs/guides/jira-integration, src/integrations/jira.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Passing branch prefix values without trailing slash'
        mechanism: >
          branchPrefix.feature etc. are used as raw string prefixes. Without a trailing
          slash the generated name runs the prefix into the slug (e.g. "featuremy-thing"
          instead of "feature/my-thing").
        wrong_pattern: |
          worktree config branchPrefix.feature feature
        correct_pattern: |
          worktree config branchPrefix.feature feature/
        source: 'docs/guides/github-issue-integration, docs/configuration'
        priority: 'MEDIUM'
        status: 'active'

tensions:
  - name: 'interactive prompts vs scripted/agent use'
    skills: ['core']
    description: >
      The CLI is designed for interactive human use (confirm prompts, branch pickers,
      spinners) but agents run it non-interactively. Prompts that a human would answer
      instantly become hangs in agent contexts.
    implication: >
      Agents should always provide explicit flag values (--source origin/main,
      exact branch names) rather than relying on the interactive defaults.

