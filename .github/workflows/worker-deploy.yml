name: Deploy Worker

# Runs automatically when worker code changes land on main.
# For the first deploy, run manually from the Actions tab.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions → Secrets):
#   CLOUDFLARE_API_TOKEN  — CF dashboard → My Profile → API Tokens → "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID — output of `wrangler whoami` or CF dashboard right sidebar

on:
  push:
    branches:
      - main
    paths:
      - "docs/worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build worker
        run: pnpm --filter docs run worker:build

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter docs exec wrangler deploy --config worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
