name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm sync-version
      - name: Ensure no nested docs lockfile is committed
        run: |
          if [[ -f docs/pnpm-lock.yaml ]]; then
            echo "docs/pnpm-lock.yaml should not exist in this workspace."
            echo "Use the root pnpm-lock.yaml as the single lockfile source of truth."
            exit 1
          fi
      - name: Verify generated docs metadata is committed
        run: git diff --exit-code -- docs/src/lib/site-meta.ts
      - name: Verify skill files are in sync with package.json
        run: git diff --exit-code -- skills/core/SKILL.md skills/_artifacts/skill_tree.yaml
      - run: pnpm docs:test
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
