name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version consistency
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/v')
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ $BRANCH_NAME =~ release/v(.+) ]]; then
            BRANCH_VERSION="${BASH_REMATCH[1]}"
            PACKAGE_VERSION=$(node -p "require('./package.json').version")

            echo "Branch version: $BRANCH_VERSION"
            echo "Package.json version: $PACKAGE_VERSION"

            if [[ "$BRANCH_VERSION" != "$PACKAGE_VERSION" ]]; then
              echo "❌ Version mismatch!"
              echo "Branch suggests version $BRANCH_VERSION but package.json has $PACKAGE_VERSION"
              echo "Please update package.json version to match the branch name"
              exit 1
            fi

            echo "✅ Version consistency validated: $BRANCH_VERSION"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:sync-version
      - name: Ensure no nested docs lockfile is committed
        run: |
          if [[ -f docs/pnpm-lock.yaml ]]; then
            echo "docs/pnpm-lock.yaml should not exist in this workspace."
            echo "Use the root pnpm-lock.yaml as the single lockfile source of truth."
            exit 1
          fi
      - name: Verify generated docs metadata is committed
        run: git diff --exit-code -- docs/src/lib/site-meta.ts
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
