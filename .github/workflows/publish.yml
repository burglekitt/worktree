name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to publish from"
        required: true
        type: string

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for creating tags

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 10 # Get recent commits to check for release merges

      - name: Check if release merge and extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BRANCH="${{ github.event.inputs.branch }}"
            if [[ $BRANCH =~ release/v(.+) ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "is_release=true" >> $GITHUB_OUTPUT
              echo "Manual release: Publishing version $VERSION from branch $BRANCH"
            else
              echo "is_release=false" >> $GITHUB_OUTPUT
              echo "Branch $BRANCH does not match release/v* pattern"
            fi
          else
            # Check recent commit messages for release branch merges
            MERGE_MSG=$(git log --oneline -10 --grep="Merge.*release/v" | head -1)
            if [[ -n "$MERGE_MSG" && "$MERGE_MSG" =~ release/v([0-9]+\.[0-9]+\.[0-9]+[^[:space:]]*) ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "is_release=true" >> $GITHUB_OUTPUT
              echo "Release merge detected: Publishing version $VERSION"
              echo "Merge commit: $MERGE_MSG"
            else
              echo "is_release=false" >> $GITHUB_OUTPUT
              echo "No release branch merge detected in recent commits"
            fi
          fi

      - name: Skip if not a release
        if: steps.version.outputs.is_release != 'true'
        run: |
          echo "This push is not from a release branch merge. Skipping publish."
          exit 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          always-auth: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build

      - name: Publish to npm
        run: npm publish

      - name: Create git tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
